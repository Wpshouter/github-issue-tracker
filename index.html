<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker || Login</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/output.css" />

    <script src="js/login.js"></script>
  </head>
  <body class="bg-gray-100 py-15">
    <section class="max-w-120 mx-auto rounded shadow-md p-10 bg-white">
      <div class="text-center mb-5">
        <p>
          <img class="max-w-[90px] mx-auto" src="./assets/github-logo.png" />
        </p>
        <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
        <p class="text-sm text-slate-500">Sing in to manage your issues</p>
      </div>
      <div id="failed" class="alert alert-error shadow-lg hidden">
  <div class="flex gap-1 items-center justify-center">
    <!-- Icon -->
    <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current flex-shrink-0 h-6 w-6" fill="#fff" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M12 9v2m0 4h.01M12 5a7 7 0 100 14a7 7 0 000-14z" />
    </svg>
    <!-- Message -->
    <span class="text-white">Login failed. Username or password is incorrect.</span>
  </div>
</div>

      <form action="" method="post">
        <fieldset class="fieldset">
          <legend class="fieldset-legend text-sm text-black font-semibold">Username</legend>
          <input id="username" type="text" class="input w-full" placeholder="Enter Username" />
          <p class="label mt-[-8px]">Default: admin</p>
        </fieldset>

           <fieldset class="fieldset">
          <legend class="fieldset-legend text-sm text-black ">Password</legend>
          <input id="password" type="password" class="input w-full" placeholder="Enter Password" />
          <p class="label mt-[-8px]">Default: admin123</p>
        </fieldset>
        <button id="login-btn" class="btn btn-primary w-full mt-3 text-white rounder-xl">Sign in</button>

      </form>

      <div class="divider mt-5">OR</div>
      <p class="text-sm text-slate-500 text-center">Demo Credentials:</p>
      <div class="bg-base-200 text-center mt-5 p-4 rounder-xl">
            <b class="font-semibold">Username: </b><span class="text-sm text-slate-500">admin</span><br>
               <b class=""font-semibold">Password: </b><span class="text-sm text-slate-500">admin123</span>
      </div>
    </section>
  </body>
</html>
